name: Miniutility
version: '${project.version}'
main: org.hotamachisubaru.miniutility.MiniutilityLoader
author: hotamachisubaru
load: POSTWORLD
api-version: '26.1.1'
softdepend: [LuckPerms]
description: copyright 2024-2026 hotamachisubaru all rights reserved.
commands:
  menu:
    description: 便利機能を開きます。
    usage: /<command>
  load:
    description: データベースからニックネームをロードします。
    usage: /<command>
    permission: miniutility.load
  prefixtoggle:
    description: prefix結合の有効無効を切り替えます。
    usage: /<command> [on|off]
permissions:
  miniutility.load:
    description: データベースからニックネームをロードします。
    default: op
